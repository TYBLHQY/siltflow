name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux
          - os: macos-15
            target: mac
          - os: windows-2022
            target: win

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Bump desktop package.json version to match tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const p=require('./apps/desktop/package.json'); p.version='$VERSION'; require('fs').writeFileSync('apps/desktop/package.json', JSON.stringify(p, null, 2)+'\n')"

      - name: Install system deps (Linux)
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libnotify-dev libnss3 libxss1 libxtst6 xdg-utils libatspi2.0-0 libuuid1 libsecret-1-dev libfuse2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @siltflow/shared build

      - name: Build desktop app (with publish)
        run: pnpm --filter @siltflow/desktop release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifacts
        if: matrix.target == 'linux'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release upload "$TAG" apps/desktop/release/*/*.AppImage apps/desktop/release/*/*.deb
          gh release edit "$TAG" --draft=false
