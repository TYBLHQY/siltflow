name: CI

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  # ── Check ──────────────────────────────────────────────────────────────
  # Runs on every push / PR / tag. Block release until this passes.
  check:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Cache TypeScript build info
        uses: actions/cache@v5
        with:
          path: apps/desktop/node_modules/.cache
          key: tsc-cache-${{ runner.os }}-${{ hashFiles('apps/desktop/tsconfig.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            tsc-cache-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint + TypeCheck + Test (parallel)
        working-directory: apps/desktop
        run: |
          set -e
          pnpm run lint &
          LINT_PID=$!
          pnpm exec tsc &
          TSC_PID=$!
          pnpm exec vitest run &
          TEST_PID=$!
          FAIL=0
          wait $LINT_PID || FAIL=1
          wait $TSC_PID || FAIL=1
          wait $TEST_PID || FAIL=1
          exit $FAIL

  # ── Release ────────────────────────────────────────────────────────────
  # Only on version tags, and only after check passes.
  release:
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux
          - os: macos-15
            target: mac
          - os: windows-2022
            target: win

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # needed for git log between tags in release notes

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Bump package.json version to match tag
        shell: bash
        working-directory: apps/desktop
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const p=require('./package.json'); p.version='$VERSION'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"

      - name: Install system deps (Linux)
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libnotify-dev libnss3 libxss1 libxtst6 \
            xdg-utils libatspi2.0-0 libuuid1 libsecret-1-dev libfuse2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Electron binaries
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: electron-cache-${{ matrix.target }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            electron-cache-${{ matrix.target }}-

      - name: Cache TypeScript build info
        uses: actions/cache@v5
        with:
          path: apps/desktop/node_modules/.cache
          key: tsc-cache-${{ matrix.target }}-${{ hashFiles('apps/desktop/tsconfig.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            tsc-cache-${{ matrix.target }}-

      - name: Build (type-check + vite in parallel)
        shell: bash
        working-directory: apps/desktop
        run: |
          set -e
          pnpm exec tsc &
          TSC_PID=$!
          pnpm exec vite build &
          VITE_PID=$!
          FAIL=0
          wait $TSC_PID || FAIL=1
          wait $VITE_PID || FAIL=1
          exit $FAIL

      - name: Package with electron-builder
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec electron-builder --publish=never

      - name: Upload artifacts to release
        shell: bash
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          # ── Create the release (linux only) ──────────────────────────
          if [ "${{ matrix.target }}" = "linux" ]; then
            PREV_TAG=$(gh release list --limit 1 --exclude-drafts --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              CHANGELOG=$(git log --oneline --no-merges "${PREV_TAG}..HEAD" 2>/dev/null || echo "* (recent changes)")
            else
              CHANGELOG=$(git log --oneline --no-merges -20)
            fi
            {
              echo "## What's Changed"
              echo ""
              echo "$CHANGELOG"
              echo ""
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG:-$(git tag --sort=-creatordate | head -1)}...${TAG}"
            } > /tmp/release-notes.md
            gh release create "$TAG" --title "${TAG#v}" --target "${{ github.sha }}" --notes-file /tmp/release-notes.md
          else
            # ── Wait for linux job to create the release ──────────────
            echo "Waiting for release $TAG to be created by the linux job…"
            for i in $(seq 1 30); do
              if gh release view "$TAG" --json tagName &>/dev/null; then
                echo "Release $TAG found."
                break
              fi
              echo "  attempt $i/30 — not ready yet, sleeping 10s…"
              sleep 10
            done
            if ! gh release view "$TAG" --json tagName &>/dev/null; then
              echo "ERROR: Release $TAG was not created after 5 minutes."
              exit 1
            fi
          fi

          # ── Upload artifacts ────────────────────────────────────────
          for f in release/*/*; do
            if [ -f "$f" ]; then
              echo "Uploading: $f"
              gh release upload "$TAG" "$f" --clobber
            fi
          done

      - name: Mark release as published (Linux only)
        if: matrix.target == 'linux'
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release edit "$TAG" --draft=false
